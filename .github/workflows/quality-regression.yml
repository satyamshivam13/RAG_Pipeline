name: quality-regression

on:
  pull_request:

jobs:
  evaluate-and-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline evaluation
        run: |
          python -m evaluation.run_eval --dataset evaluation/datasets/phase2_eval.jsonl --output evaluation/reports/phase2-latest.json

      - name: Enforce quality gates
        run: |
          python -m evaluation.quality_gates --report evaluation/reports/phase2-latest.json

      - name: Upload evaluation artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase2-eval-report
          path: evaluation/reports/phase2-latest.json
